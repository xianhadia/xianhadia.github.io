# ============================================================
# STEP 1: Your Identity (required)
# ============================================================
name: "Richard Feynman"
title: "Professor of Physics"
institution: "California Institute of Technology"
email: richard@university.edu
photo: headshot.jpg  # place your photo in images/

# ============================================================
# STEP 2: Your Links (optional -- delete any you don't use)
# ============================================================
links:
  google_scholar: "https://scholar.google.com/citations?user=B7vSqZsAAAAJ"
  github: "https://github.com/"
  researchgate: "https://www.researchgate.net/"
  orcid: ""
  twitter: ""
  linkedin: ""
  cv: ""  # e.g., "papers/cv.pdf" — leave blank to hide the CV icon

# ============================================================
# STEP 3: Site Settings
# ============================================================
accent_color: "#1a7a6d"      # theme color for links and buttons
dark_mode: true              # show dark mode toggle in navbar
description: "Academic webpage of Dr. Richard Feynman"
baseurl: ""
url: ""

# Google Analytics — paste your GA4 measurement ID, or leave blank
analytics:
  google_id: ""

# ============================================================
# STEP 4: Choose Your Pages (comment out any you don't need)
# ============================================================
nav_pages:
  - name: about
  - name: publications
  - name: talks
  - name: research
  - name: software
  - name: team
  - name: teaching
  - name: blogs

# ============================================================
# Advanced Settings (you probably don't need to change these)
# ============================================================
include:
  - .htaccess
  - _pages

sass:
  quiet_deps: true
  style: compressed

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true

plugins: ["jekyll/scholar", "jekyll-sitemap"]

scholar:
  last_name: Doe
  first_name: [John]
  style: citesty
  locale: en
  source: /assets/
  bibliography: ref.bib
  bibliography_template: bibtemplate
  sort_by: year, month
  order: descending
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"
  bibliography_list_attributes:
    reversed: "reversed"

exclude:
  - Gemfile
  - Gemfile.lock
  - update_bootstrap.sh
  - switch_theme.sh
  - tags
  - Rakefile
  - node_modules
  - package.json
  - package-lock.json
  - docs

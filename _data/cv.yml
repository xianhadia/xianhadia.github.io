        summary: Automated optical metrology systems and developed software interfaces for precision measurement.
        highlights:
          - Automated an optical metrology system integrating a laser, interferometer, and optical switches.
          - Developed software interfaces and synchronized communication protocols for device control and data acquisition.
          - Built applications that let technicians configure test setups and automate strain calculations from spectral-shift data.
          - Transformed a labor-intensive, multi-operator workflow into a single-operator process, reducing test time by 8x.

